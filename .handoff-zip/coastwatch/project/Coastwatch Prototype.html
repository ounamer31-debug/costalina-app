<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Coastwatch — Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #EEF1F3; }
  body {
    font-family: 'Plus Jakarta Sans', -apple-system, system-ui, sans-serif;
    color: #0E1B22;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  .stage {
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
    background:
      radial-gradient(900px 600px at 20% 0%, #E3F0F2 0%, transparent 60%),
      radial-gradient(700px 500px at 100% 100%, #F0E8DC 0%, transparent 55%),
      #EEF1F3;
  }
  /* Sheet animations */
  @keyframes cwFade   { from { opacity: 0 } to { opacity: 1 } }
  @keyframes cwSlideUp{ from { transform: translateY(28px); opacity: 0.4 } to { transform: translateY(0); opacity: 1 } }
  button:active { transform: scale(0.97); transition: transform 80ms ease-out; }
  /* Hide default scrollbars on the phone */
  .stage *::-webkit-scrollbar { width: 0; height: 0; }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="icons.jsx"></script>
  <script type="text/babel" src="screens.jsx"></script>

  <script type="text/babel">
    const Root = () => (
      <div className="stage">
        <IOSDevice width={390} height={844}>
          <CoastwatchApp/>
        </IOSDevice>
      </div>
    );
    ReactDOM.createRoot(document.getElementById('root')).render(<Root/>);
  </script>
</body>
</html>
